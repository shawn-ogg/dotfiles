# --- terminal --------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- behavior --------------------------------------------------------------

set -sg escape-time 0
set -g history-limit 100000
set -g mouse on
set -g focus-events on
set -g set-clipboard on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- prefix ----------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# reload
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# --- splits ----------------------------------------------------------------

unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- vim navigation --------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# --- copy mode -------------------------------------------------------------

setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection

# macOS clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- status ----------------------------------------------------------------

# --- status bar ------------------------------------------------------------

set -g status-position top
#set -g status-style "bg=#1b1b1b"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#ffb86c,bold] #S "

# Right: clock
set -g status-right-length 120
set -g status-right "#(~/.config/tmux/us-times.sh) | #[fg=#00ffff]%H:%M "
#set -g status-right "#[fg=#f1fa8c] %H:%M "
set -g status-interval 60

# Window tabs
setw -g window-status-format " #[fg=#888888]#I:#W "
setw -g window-status-current-format " #[fg=#1b1b1b,bg=#ffb86c,bold] #I:#W "

# Pane borders
set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=#ffb86c

#set -g status-position top
set -g status-style "bg=default"
#
#set -g status-left "#[bold] #S "
#set -g status-right " %H:%M "
#
#set -g pane-border-style fg=colour238
#set -g pane-active-border-style fg=magenta

# --- sesh ------------------------------------------------------------------

bind s display-popup -E "sesh connect $(sesh list | fzf)"
bind C-s command-prompt -p "new session" \
  "run-shell '~/bin/sesh-new \"%%\"'"

# --- smart vim navigation --------------------------------------------------

#is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '([gn]?vim|fzf)'"

#bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
#bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
#bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
#bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# --- plugins ---------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-strategy-nvim 'session'

# Automatically save every 15 minutes
set -g @continuum-save-interval '15'

# Auto-restore tmux environment on startup
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
